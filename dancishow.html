<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, minimum-scale=0.1, maximum-scale=10.0">
    <title>拼读演示</title>
    <style>
        /* CSS 变量 - 浅色主题（默认） */
        :root {
            --bg-primary: #f0f0f0;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f8f9fa;
            --text-primary: #333;
            --text-secondary: #555;
            --text-muted: #666;
            --border-color: #ddd;
            --vowel-color: #d32f2f;
            --consonant-color: #388E3C;
            --btn-blue: #4a90e2;
            --btn-blue-hover: #3a80d2;
            --btn-green: #22c55e;
            --btn-green-hover: #16a34a;
            --btn-orange: #f59e0b;
            --btn-orange-hover: #d97706;
            --btn-purple: #6366f1;
            --btn-purple-hover: #4f46e5;
            --btn-gray: #94a3b8;
            --btn-gray-hover: #64748b;
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-medium: rgba(0, 0, 0, 0.15);
        }
        
        /* CSS 变量 - 暗色主题 */
        body.dark-theme {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #2a2a2a;
            --text-primary: #e8e8e8;
            --text-secondary: #d0d0d0;
            --text-muted: #8a8a8a;
            --border-color: #3a3a3a;
            --vowel-color: #d4787d;
            --consonant-color: #7ec89a;
            --btn-blue: #7aa8d4;
            --btn-blue-hover: #8ab8e4;
            --btn-green: #7ec89a;
            --btn-green-hover: #8ed8aa;
            --btn-orange: #d4a656;
            --btn-orange-hover: #e4b666;
            --btn-purple: #a78bfa;
            --btn-purple-hover: #b79bfa;
            --btn-gray: #6b7280;
            --btn-gray-hover: #9ca3af;
            --shadow-light: rgba(0, 0, 0, 0.2);
            --shadow-medium: rgba(0, 0, 0, 0.3);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s ease;
        }
        
        /* 主题切换按钮 */
        .theme-toggle-btn {
            
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1000;
            display:none;
        }
        
        .theme-toggle-btn:hover {
            background-color: var(--border-color);
        }
        
        .card {
            max-width: 1000px;
            margin: 0 auto;
            padding: 25px;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: 0 4px 12px var(--shadow-medium);
        }
        
        h1 {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
            color: var(--text-primary);
        }
        
        .letter-info {
            text-align: center;
            margin-bottom: 5px;
            padding: 3px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }
        
        .letter-info .big-letter {
            font-size: 48px;
            font-weight: bold;
            color: var(--vowel-color);
        }
        
        .letter-info .phonetic {
            font-size: 32px;
            color: var(--consonant-color);
            font-family: Arial, sans-serif;
        }
        
        .letter-info .arrow {
            font-size: 32px;
            color: var(--text-primary);
            margin: 0 10px;
        }
        
        .settings-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .settings-container label {
            margin-right: 8px;
            color: var(--text-secondary);
        }
        
        .settings-container select {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-secondary);
        }
        
        .button-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .btn-primary {
            background-color: var(--btn-blue);
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 2px 4px var(--shadow-medium);
            transition: all 0.3s ease;
            margin: 0 5px;
        }
        
        .btn-primary:hover {
            background-color: var(--btn-blue-hover);
        }
        
        .btn-primary:active {
            transform: scale(0.97);
        }
        
        .btn-primary:disabled {
            background-color: #9ca3af;
            color: white;
            cursor: not-allowed;
        }
        
        .btn-prepare {
            background-color: var(--btn-purple);
        }
        .btn-prepare:hover {
            background-color: var(--btn-purple-hover);
        }
        
        .btn-showall {
            background-color: var(--btn-gray);
        }
        .btn-showall:hover {
            background-color: var(--btn-gray-hover);
        }
        
        .btn-stop {
            background-color: var(--btn-orange);
        }
        .btn-stop:hover {
            background-color: var(--btn-orange-hover);
        }
        
        .btn-vowel {
            background-color: var(--vowel-color);
            color: white;
            font-weight: bold;
            padding: 5px 5px;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 8px var(--shadow-medium);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 36px;
            margin: 2px;
        }
        
        .btn-consonant {
            background-color: var(--consonant-color);
            color: white;
            font-weight: bold;
            padding: 5px 5px;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 8px var(--shadow-medium);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 36px;
            margin: 2px;
        }
        
        .btn-vowel:hover, .btn-consonant:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }
        
        .btn-vowel:active, .btn-consonant:active {
            transform: scale(0.9);
        }

        .word-list-title {
            font-size: 25px;
            font-weight: bold;
            color: var(--btn-orange);
            background-color: var(--bg-tertiary);
            padding: 5px 5px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 8px;
            box-shadow: 0 2px 4px var(--shadow-medium);
        }
        
        .word-item {
            margin: 12px 0;
            padding: 8px;
            border-radius: 8px;
            background-color: var(--bg-tertiary);
            text-align: center;
        }
        .word-item .chinese {
            font-size: 22px;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        .word-item .english {
            display:none;
            font-size: 32px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .word-item .segment-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 40px;
        }
        
        #statusMessage {
            display:block;
            text-align: center;
            color: var(--text-secondary);
            min-height: 24px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .word-progress {
            display:block;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.7); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.9); }
            100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.7); }
        }
        
        .glow {
            animation: glow 0.2s ease-in-out infinite;
            transform: scale(1.15);
        }

        @keyframes wholeWordGlow {
            0% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.8); }
            50% { box-shadow: 0 0 60px rgba(255, 215, 0, 0.9); }
            100% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.8); }
        }
        
        .whole-word-glow {
            animation: wholeWordGlow 0.2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <button class="theme-toggle-btn" id="themeToggle">
        <span class="icon">🌙</span>
        <span class="text">暗色</span>
    </button>
    
    <div class="card">
        <h1>拼读演示</h1>
        
        <div class="letter-info" id="letterInfo">
            <span class="big-letter" id="bigLetter">-</span>
            <span class="arrow">→</span>
            <span class="phonetic" id="phoneticText">/-/</span>
        </div>
        
        <div class="settings-container">
            <label for="pageCountSelect">每页单词数：</label>
            <select id="pageCountSelect">
                <option value="1">1个</option>
                <option value="2">2个</option>
                <option value="3" selected>3个</option>
                <option value="4">4个</option>
                <option value="5">5个</option>
                <option value="6">6个</option>
                <option value="7">7个</option>
                <option value="8">8个</option>
                <option value="9">9个</option>
                <option value="10">10个</option>
            </select>
            
            <label for="englishReadCount">英文读几次：</label>
            <select id="englishReadCount">
                <option value="1">1次</option>
                <option value="2" selected>2次</option>
                <option value="3">3次</option>
                <option value="4">4次</option>
                <option value="5">5次</option>
            </select>
            
            <label for="chineseReadCount">中文读几次：</label>
            <select id="chineseReadCount">
                <option value="0" selected>0次</option>
                <option value="1">1次</option>
                <option value="2">2次</option>
                <option value="3">3次</option>
                <option value="4">4次</option>
                <option value="5">5次</option>
            </select>
        </div>
        
        <div class="button-container">
            <button id="prepareBtn" class="btn-primary btn-prepare">📋 准备</button>
            <button id="startButton" class="btn-primary">▶ 开始学习</button>
            <button id="stopButton" class="btn-primary btn-stop" disabled>■ 停止</button>
            <button id="showAllBtn" class="btn-primary btn-showall">📖 显示全部</button>
        </div>        
        <div class="word-progress" id="wordProgress" style="display:none">
            准备就绪
        </div>

        <div class="word-list-title">自然拼读&nbsp;·&nbsp;拼单词</div>
        
        <div id="allWordsContainer"></div>
		
        <div style="height:600px;"></div>
        
        <div id="statusMessage" style="display:none">
            请输入单词结构，点击【准备】显第1页，点击【开始学习】自动朗读
        </div>
    </div>

    <script src="database.js"></script>
    <script src="datapair.js"></script>
    <script src="map.js"></script>

    <script>
        // ================= 主题切换功能 =================
        function initTheme() {
            const params = new URLSearchParams(window.location.search);
            const bParam = params.get('b');
            const themeToggle = document.getElementById('themeToggle');
            const icon = themeToggle.querySelector('.icon');
            const text = themeToggle.querySelector('.text');
            
            let isDark = false;
            
            if (bParam !== null) {
                isDark = bParam === '0';
            } else {
                const savedTheme = localStorage.getItem('theme');
                isDark = savedTheme === 'dark';
            }
            
            if (isDark) {
                document.body.classList.add('dark-theme');
                icon.textContent = '☀️';
                text.textContent = '浅色';
            }
        }
        
        function toggleTheme() {
            const themeToggle = document.getElementById('themeToggle');
            const icon = themeToggle.querySelector('.icon');
            const text = themeToggle.querySelector('.text');
            
            document.body.classList.toggle('dark-theme');
            
            if (document.body.classList.contains('dark-theme')) {
                localStorage.setItem('theme', 'dark');
                icon.textContent = '☀️';
                text.textContent = '浅色';
            } else {
                localStorage.setItem('theme', 'light');
                icon.textContent = '🌙';
                text.textContent = '暗色';
            }
        }
        
        // 初始化主题
        initTheme();
        
        // 主题切换按钮事件
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        
        let currentWordIndex = 0;
        let currentSegmentIndex = 0;
        let wordInfoList = [];
        let isPlaying = false;
        let pageCount = 3;
        let currentPage = 0;
        let totalPages = 0;
        let isPrepared = false;
        
        const prepareBtn = document.getElementById('prepareBtn');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const showAllBtn = document.getElementById('showAllBtn');
        const allWordsContainer = document.getElementById('allWordsContainer');
        const statusMessage = document.getElementById('statusMessage');
        const wordProgress = document.getElementById('wordProgress');
        const chineseReadCountSelect = document.getElementById('chineseReadCount');
        const englishReadCountSelect = document.getElementById('englishReadCount');
        const pageCountSelect = document.getElementById('pageCountSelect');
        const bigLetter = document.getElementById('bigLetter');
        const phoneticText = document.getElementById('phoneticText');
        
        function addClickHandler(btn, handler) {
            btn.onclick = handler;
            btn.ontouchend = function(e) {
                e.preventDefault();
                handler();
                return false;
            };
        }
        
        addClickHandler(prepareBtn, prepareLearning);
        addClickHandler(startButton, startLearning);
        addClickHandler(stopButton, stopLearning);
        addClickHandler(showAllBtn, showAllWords);
        
        pageCountSelect.addEventListener('change', function() {
            pageCount = parseInt(this.value);
            totalPages = Math.ceil(wordInfoList.length / pageCount);
            
            wordInfoList.forEach((wordInfo, i) => {
                const newPage = Math.floor(i / pageCount);
                wordInfo.page = newPage;
                wordInfo.wordItem.dataset.page = newPage;
            });
            
            currentPage = 0;
            currentWordIndex = 0;
            showCurrentPage(false);
            updateWordProgress();
            isPrepared = false;
            showStatus(`已更新每页单词数为${pageCount}个，共${totalPages}页`, '#4a90e2');
        });
        
        document.addEventListener('keydown', function(event) {
            if (event.key === 'f') {event.preventDefault(); startLearning();}
            if (event.key === 'd') {event.preventDefault(); stopLearning();}
            if (event.key === 'g') {event.preventDefault(); prepareLearning();}
            if (event.key === 'a') {event.preventDefault(); showAllWords();}
        });
        
        let targetVoice = null;
        const synth = window.speechSynthesis;
        function preloadVoice() {
            function handleVoicesLoaded() {
                const voices = synth.getVoices();
                targetVoice = voices.find(voice => 
                    voice.name === 'Microsoft Xiaoyi Online (Natural) - Chinese (Mainland)'
                );
                synth.removeEventListener('voiceschanged', handleVoicesLoaded);
            }
            synth.addEventListener('voiceschanged', handleVoicesLoaded);
            synth.getVoices();
        }

        document.addEventListener('DOMContentLoaded', function() {
            preloadVoice();
            pageCount = parseInt(pageCountSelect.value);
        });
        
        window.onload = function() {
            if (typeof WORD_DATABASE === 'undefined') {
                showStatus('database.js 加载失败', 'red');
                statusMessage.style.display = 'block';
                return;
            }
            if (typeof CHUZHONG1_DB === 'undefined') {
                showStatus('datapair.js 加载失败', 'red');
                statusMessage.style.display = 'block';
                return;
            }
            if (typeof PHONETIC_MAP === 'undefined') {
                showStatus('map.js 加载失败', 'red');
                statusMessage.style.display = 'block';
                return;
            }
            
            try {
                initFromUrlParams();
            } catch(e) {
                showStatus('初始化错误: ' + e.message, 'red');
                console.error('initFromUrlParams error:', e);
            }
        };
        
        function initFromUrlParams() {
            const params = new URLSearchParams(window.location.search);
            let z = params.get('z') || '';
            let y = params.get('y') || '';
            const s = params.get('s') || '1';
            
            if (z && z.includes('%')) {
                try { z = decodeURIComponent(z); } catch(e) {}
            }
            if (y && y.includes('%')) {
                try { y = decodeURIComponent(y); } catch(e) {}
            }
            
            console.log('params:', {z, y, s});
            
            bigLetter.textContent = z || '-';
            phoneticText.textContent = y ? `/${y}/` : '/-/';
            
            if (!z || !y) {
                showStatus('缺少参数：需要 z(字母) 和 y(音标)', 'red');
                return;
            }
            
            if (typeof WORD_DATABASE === 'undefined') {
                showStatus('数据库未加载', 'red');
                return;
            }
            
            const key = `${z}_${y}`;
            console.log('lookup key:', key);
            
            const rawText = WORD_DATABASE[key];
            console.log('rawText found:', rawText ? 'yes' : 'no');
            
            if (!rawText) {
                showStatus(`未找到数据：${key}`, 'red');
                return;
            }
            
            const wordList = parseWordListFromDatabase(rawText, parseInt(s));
            console.log('wordList count:', wordList.length);
            
            if (wordList.length === 0) {
                showStatus(`未找到 ${s} 音节单词`, 'red');
                return;
            }
            
            loadWordsFromList(wordList);
            showStatus(`已加载 ${wordInfoList.length} 个单词，点击【准备】开始分页学习`, '#4a90e2');
            
            prepareBtn.disabled = false;
            startButton.disabled = false;
            showAllBtn.disabled = false;
        }
        
        function parseWordListFromDatabase(text, targetSyllable) {
            const lines = text.split('\n');
            const results = [];
            let inTargetSection = false;
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                if (line.startsWith('[音节')) {
                    const match = line.match(/\d+/);
                    const syllableNum = match ? parseInt(match[0]) : 0;
                    inTargetSection = (syllableNum === targetSyllable);
                    continue;
                }
                
                if (line.startsWith('[')) {
                    inTargetSection = false;
                    continue;
                }
                
                if (inTargetSection && line.includes('=')) {
                    const eqIndex = line.indexOf('=');
                    const rawWord = line.substring(0, eqIndex).trim();
                    const meaning = line.substring(eqIndex + 1).trim();
                    
                    if (!/[\u4e00-\u9fa5]/.test(meaning)) continue;
                    if (!/[a-zA-Z]/.test(rawWord)) continue;
                    
                    results.push({ rawWord, meaning });
                }
            }
            
            return results;
        }
        
        function loadWordsFromList(wordList) {
            allWordsContainer.innerHTML = '';
            wordInfoList = [];
            
            for (let i = 0; i < wordList.length; i++) {
                const { rawWord, meaning } = wordList[i];
                let pureWord = rawWord.replace(/8-/g, '\u0002');
                pureWord = pureWord.replace(/-/g, '');
                pureWord = pureWord.replace(/\u0002/g, '-');
                
                const segments = parseWordToSegments(rawWord, pureWord);
                const word = segments.map(seg => seg.letters).join('');
                const wordPage = Math.floor(i / pageCount);
                
                const wordItem = document.createElement('div');
                wordItem.className = 'word-item fade-in';
                wordItem.dataset.wordIndex = i;
                wordItem.dataset.page = wordPage;

                const chineseEl = document.createElement('div');
                chineseEl.className = 'chinese';
                chineseEl.textContent = meaning || '无释义';
                const englishEl = document.createElement('div');
                englishEl.className = 'english';
                englishEl.textContent = word;
                const buttonsEl = document.createElement('div');
                buttonsEl.className = 'segment-buttons';

                const segmentButtons = [];
                for (let j = 0; j < segments.length; j++) {
                    const seg = segments[j];
                    const btn = document.createElement('button');
                    btn.className = seg.type === 'vowel' ? 'btn-vowel' : 'btn-consonant';
                    btn.textContent = seg.letters;
                    btn.dataset.segIndex = j;
                    btn.dataset.sound = seg.sound;
                    btn.addEventListener('click', function() {
                        if (isPlaying) stopLearning();
                        playSound(seg.sound);
                    });
                    buttonsEl.appendChild(btn);
                    segmentButtons.push(btn);
                }

                wordItem.appendChild(chineseEl);
                wordItem.appendChild(englishEl);
                wordItem.appendChild(buttonsEl);
                allWordsContainer.appendChild(wordItem);

                wordInfoList.push({
                    meaning, word, segments, wordItem, segmentButtons, page: wordPage
                });
            }
            
            totalPages = Math.ceil(wordInfoList.length / pageCount);
            wordProgress.style.display = 'block';
            statusMessage.style.display = 'block';
            updateWordProgress();
            showCurrentPage(true);
        }
        
        function parseWordToSegments(rawWord, pureWord) {
            let segments = [];
            
            if (typeof CHUZHONG1_DB !== 'undefined') {
                const dbLines = CHUZHONG1_DB.split('\n');
                for (let line of dbLines) {
                    if (line.trim().startsWith(pureWord + '=')) {
                        const dataPart = line.split('=')[1];
                        const pairs = dataPart.split('8');
                        
                        pairs.forEach(pair => {
                            const parts = pair.split('@');
                            if (parts.length >= 2) {
                                const letter = parts[0];
                                const phonetic = parts[1];
                                
                                const mapValue = soundTypeMap[phonetic];
                                let type = 'consonant';
                                if (mapValue !== undefined) {
                                    type = mapValue === 1 ? 'vowel' : 'consonant';
                                } else {
                                    if (/[aeiou]/i.test(letter)) {
                                        type = 'vowel';
                                    }
                                }
                                
                                segments.push({
                                    letters: letter,
                                    sound: phonetic,
                                    type: type
                                });
                            }
                        });
                        
                        return segments;
                    }
                }
            }
            
            let text = rawWord.replace(/8-/g, '\u0002');
            const parts = text.split('-');
            
            parts.forEach((part, index) => {
                if (!part) return;
                let content = part.replace(/\u0002/g, '-');
                if (!content) return;
                
                segments.push({
                    letters: content,
                    sound: content.toLowerCase(),
                    type: /[aeiou]/i.test(content) ? 'vowel' : 'consonant'
                });
            });
            
            return segments;
        }

        function showCurrentPage(isForceShowAll = false) {
            if (wordInfoList.length === 0) return;
            wordInfoList.forEach(wordInfo => {
                if (isForceShowAll) {
                    wordInfo.wordItem.style.display = 'block';
                } else {
                    wordInfo.wordItem.style.display = wordInfo.page === currentPage ? 'block' : 'none';
                }
            });
        }

        function prepareLearning() {
            if (wordInfoList.length === 0) return;
            
            pageCount = parseInt(pageCountSelect.value);
            totalPages = Math.ceil(wordInfoList.length / pageCount);
            currentPage = 0;
            currentWordIndex = 0;
            currentSegmentIndex = 0;
            isPlaying = false;
            isPrepared = true;

            showCurrentPage(false);
            updateWordProgress();
            showStatus(`已准备就绪，仅显示第1页（共${totalPages}页），点击【开始学习】开始朗读`, '#6366f1');
            setButtonStatus(false);
        }

        function startLearning() {
            if (!isPrepared) {
                prepareLearning();
            }
            if (wordInfoList.length === 0) return;

            isPlaying = true;
            currentSegmentIndex = 0;
            showStatus(`开始学习第${currentPage + 1}页/${totalPages}页`, '#22c55e');
            setButtonStatus(true);

            setTimeout(() => {
                readCurrentSegment();
            }, 300);
        }
        
        function stopLearning() {
            if (!isPlaying) return;
            isPlaying = false;
            currentSegmentIndex = 0;
            const allAudios = document.getElementsByTagName('audio');
            for (let audio of allAudios) audio.pause();
            window.speechSynthesis.cancel();
            wordInfoList.forEach(wordInfo => {
                wordInfo.segmentButtons.forEach(btn => {
                    btn.classList.remove('glow');
                    btn.classList.remove('whole-word-glow');
                });
            });
            showStatus('已停止学习，保留当前页显示，可继续点击【开始学习】', '#f59e0b');
            setButtonStatus(false);
        }

        function showAllWords() {
            isPlaying = false;
            isPrepared = false;
            const items = document.querySelectorAll('.word-item');
            items.forEach(item => {
                item.style.display = 'block';
            });
            showStatus(`已显示所有单词`, '#94a3b8');
        }

        function readCurrentSegment() {
            if (!isPlaying) return;
            const currentWordInfo = wordInfoList[currentWordIndex];
            const currentSegments = currentWordInfo.segments;

            if (currentSegmentIndex >= currentSegments.length) {
                setTimeout(() => {
                    readWholeWord(currentWordInfo);
                }, 100);
                return;
            }

            const currentSeg = currentSegments[currentSegmentIndex];
            const currentBtn = currentWordInfo.segmentButtons[currentSegmentIndex];
            currentBtn.classList.add('glow');
            playSound(currentSeg.sound);
            setTimeout(() => {
                playSound(currentSeg.sound);
                setTimeout(() => {
                    currentBtn.classList.remove('glow');
                    currentSegmentIndex++;
                    setTimeout(readCurrentSegment, 400);
                }, 500);
            }, 500);
        }
        
        function readWholeWord(wordInfo) {
            if (!isPlaying) return;
            showStatus(`正在朗读单词: ${wordInfo.word}`, '#22c55e');
            const word = wordInfo.word;
            let count = 0;
            const totalReads = parseInt(englishReadCountSelect.value) || 2;

            wordInfo.segmentButtons.forEach(btn => btn.classList.add('whole-word-glow'));
            function playWordAudio() {
                if (!isPlaying || count >= totalReads) {
                    wordInfo.segmentButtons.forEach(btn => btn.classList.remove('whole-word-glow'));
                    if (wordInfo.meaning && chineseReadCountSelect.value > 0) {
                        setTimeout(() => {
                            readChineseMeaning(wordInfo);
                        }, 100);
                    } else {
                        nextWord();
                    }
                    return;
                }
                count++;
                const audio = new Audio(`https://dict.youdao.com/dictvoice?type=1&audio=${encodeURIComponent(word)}`);
                audio.onended = () => {setTimeout(playWordAudio, 100);};
                audio.play().catch(err => {
                    console.log('单词发音播放失败:', err);
                    setTimeout(playWordAudio, 100);
                });
            }
            playWordAudio();
        }

        function readChineseMeaning(wordInfo) {
            if (!isPlaying) return;
            const count = parseInt(chineseReadCountSelect.value);
            if (count <= 0) {nextWord(); return;}
            showStatus(`正在朗读释义: ${wordInfo.meaning}`, '#22c55e');
            const speech = new SpeechSynthesisUtterance();
            speech.text = wordInfo.meaning + "。";
            if (targetVoice) speech.voice = targetVoice;
            speech.volume = 1; speech.rate = 1; speech.pitch = 1;

            let readCount = 0;
            function speak() {
                if (!isPlaying || readCount >= count) {nextWord(); return;}
                readCount++;
                window.speechSynthesis.speak(speech);
                speech.onend = () => {
                    if (readCount < count) setTimeout(speak, 800);
                    else nextWord();
                };
            }
            speak();
        }

        function nextWord() {
            const currentPageLastIndex = (currentPage + 1) * pageCount - 1;
            currentWordIndex++;
            currentSegmentIndex = 0;

            if (currentWordIndex > currentPageLastIndex) {
                currentPage++;
                if (currentPage >= totalPages) {
                    isPlaying = false;
                    const allAudios = document.getElementsByTagName('audio');
                    for (let audio of allAudios) audio.pause();
                    window.speechSynthesis.cancel();
                    wordInfoList.forEach(wordInfo => {
                        wordInfo.segmentButtons.forEach(btn => {
                            btn.classList.remove('glow');
                            btn.classList.remove('whole-word-glow');
                        });
                    });
                    currentPage = totalPages - 1;
                    showCurrentPage(false);
                    updateWordProgress();
                    showStatus(`所有单词学习完毕！仅显示最后一页（第${totalPages}页）`, '#22c55e');
                    setButtonStatus(false);
                    return;
                }
                currentWordIndex = currentPage * pageCount;
                showCurrentPage(false);
                showStatus(`已完成第${currentPage}页，开始学习第${currentPage + 1}页/${totalPages}页`, '#4a90e2');
            }

            updateWordProgress();
            showStatus(`准备学习下一个单词: ${wordInfoList[currentWordIndex].word}`, '#4a90e2');
            setTimeout(readCurrentSegment, 400);
        }
        
        function updateWordProgress() {
            if (wordInfoList.length === 0) {
                wordProgress.textContent = '准备就绪';
                return;
            }
            const pageWordIndex = currentWordIndex - (currentPage * pageCount) + 1;
            const pageWordTotal = Math.min(pageCount, wordInfoList.length - (currentPage * pageCount));
            wordProgress.textContent = `页 ${currentPage + 1}/${totalPages} | 单词 ${pageWordIndex}/${pageWordTotal} (总${wordInfoList.length}个)`;
        }
        
        function playSound(sound) {
            const audioFileKey = phoneticToKeyMap[sound] || sound;
            const localAudio = new Audio(`yinbiao/1/${audioFileKey}.mp3`);
            localAudio.play().catch(error => {
                console.log(`本地音频播放失败 ${sound}，尝试有道API:`, error);
                const youdaoAudio = new Audio(`https://dict.youdao.com/dictvoice?type=1&audio=${encodeURIComponent(audioFileKey)}`);
                youdaoAudio.play().catch(err => console.log('有道API播放失败:', err));
            });
        }
        
        function showStatus(message, color) {
            statusMessage.textContent = message;
            statusMessage.style.color = color;
            statusMessage.style.display = 'block';
        }

        function setButtonStatus(isPlayingState) {
            prepareBtn.disabled = isPlayingState;
            startButton.disabled = isPlayingState;
            stopButton.disabled = !isPlayingState;
            showAllBtn.disabled = isPlayingState;
        }

        function resetButtonStatus() {
            isPlaying = false;
            prepareBtn.disabled = false;
            startButton.disabled = wordInfoList.length === 0;
            stopButton.disabled = true;
            showAllBtn.disabled = wordInfoList.length === 0;
        }
    </script>
</body>
</html>
